<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Nambikkai</title>
    <link rel="stylesheet" href="../css/signup.css">
    <style>
    </style>
</head>

<body>
    <!-- Navbar -->
    <header class="header">
        <div class="logo">NAMBIKKAI</div>
        <nav class="nav-links">
            <a href="../../index.html">Home</a>
            <a href="ngo_list.html">NGO's</a>
            <a href="lawyer_list.html">Lawyers</a>
            <a href="book_appointment.html">Book Appointment</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <!-- Signup Form -->
    <div class="container">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
            <div class="switch">
                Already have an account? <a href="./login.html">Login</a>
            </div>
            <script>
                document.getElementById('signupForm').addEventListener('submit', async function (e) {
                    e.preventDefault();

                    const full_name = document.getElementById('full_name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    try {
                        const response = await fetch('http://localhost:8000/api/auth/signup', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                full_name: full_name,
                                email: email,
                                password: password
                            }),
                        });

                        const data = await response.json();

                        if (response.ok) {
                            alert('Registration successful! Please login.');
                            window.location.href = './login.html';
                        } else {
                            alert('Registration failed: ' + (data.detail || 'Unknown error'));
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('An error occurred. Please make sure the server is running.');
                    }
                });
            </script>
</body>

</html>
